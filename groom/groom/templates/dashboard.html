<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>groom</title>
  <link rel="stylesheet" href="/assets/diff2html.min.css">
  <link rel="stylesheet" href="/assets/hljs-github-dark.min.css">
  <link rel="stylesheet" href="/assets/dashboard.css">
  <script src="/assets/htmx.min.js"></script>
  <script src="/assets/htmx-ext-ws.min.js"></script>
  <script src="/assets/marked.min.js"></script>
  <script src="/assets/purify.min.js"></script>
  <script src="/assets/diff2html.min.js"></script>
  <script src="/assets/highlight.min.js"></script>
</head>
<body>
  <div class="app" data-mode="inbox" hx-ext="ws" ws-connect="/ws">
    <!-- activity bar: the three panels + settings -->
    <div id="activitybar">
      <div class="act-btn active" data-mode="inbox" title="Inbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 13h4l2 3h6l2-3h4"/><path d="M5 5h14v14H5z"/></svg>
      </div>
      <div class="act-btn" data-mode="files" title="Files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h6l2 2h8v11H4z"/></svg>
      </div>
      <div class="act-btn" data-mode="diff" title="Diff">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 7h10M7 7l3-3M7 7l3 3"/><path d="M17 17H7M17 17l-3-3M17 17l-3 3"/></svg>
      </div>
      <div class="act-spacer"></div>
      <div class="act-btn" data-mode="settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>
      </div>
    </div>

    <!-- main: one panel at a time, chosen by data-mode -->
    <div id="main">
      <!-- 1) INBOX: message list + gate answer -->
      <div id="inbox-pane" class="pane">
        <div id="inbox">
          <div class="pane-head">
            <span>Inbox — needs you</span>
            <input class="filter" type="search" name="q" aria-label="Filter incoming messages"
                   placeholder="Filter messages…"
                   hx-get="/search" hx-trigger="input changed delay:250ms, search" hx-swap="none">
          </div>
          <div class="inbox-list" id="inbox-list"></div>
        </div>
        <div id="detail"><div class="detail-empty">Select a message to answer its gate.</div></div>
      </div>

      <!-- 2) FILES: container+repo tree + syntax-highlighted viewer -->
      <div id="files-pane" class="pane">
        <div class="picker-bar">
          <button class="repo-picker" type="button" data-picker="files">
            <span class="repo-picker-label">Select container / repo…</span><span class="caret">▾</span>
          </button>
        </div>
        <div class="fd-split">
          <div class="fd-tree" id="files-tree"><div class="fd-empty">Pick a container / repo above.</div></div>
          <div class="fd-view" id="file-view"><div class="fd-empty">Select a file to view it.</div></div>
        </div>
      </div>

      <!-- 3) DIFF: changeset tree + diff viewer -->
      <div id="diff-pane" class="pane">
        <div class="picker-bar">
          <button class="repo-picker" type="button" data-picker="diff">
            <span class="repo-picker-label">Select container / repo…</span><span class="caret">▾</span>
          </button>
        </div>
        <div class="fd-split">
          <div class="fd-tree" id="diff-tree"><div class="fd-empty">Pick a container / repo above.</div></div>
          <div class="fd-view" id="diff-view"><div class="fd-empty">Select a changed file to see its diff.</div></div>
        </div>
      </div>

      <!-- settings -->
      <div id="settings-pane" class="pane">
        <div class="settings-panel">
          <h2>Settings</h2>
          <div class="row-set"><button class="btn" id="btn-refresh">Rescan containers</button>
            <span>Re-run the docker discovery pass.</span></div>
          <div class="row-set"><button class="btn ghost" id="btn-notify">Enable notifications</button>
            <span>Browser alerts when a worker blocks.</span></div>
        </div>
      </div>
    </div>

    <!-- status bar -->
    <div id="statusbar"></div>
  </div>

  <!-- shared Zed-style container+repo menu (positioned under the active picker) -->
  <div id="repo-menu-wrap">
    <div class="repo-menu-box">
      <input id="repo-search" type="text" aria-label="Search container / repo" placeholder="Search container / repo…">
      <div id="repo-menu"></div>
    </div>
  </div>

  <!-- command palette -->
  <div id="palette">
    <div class="palette-box">
      <input id="palette-input" type="text" aria-label="Jump to a worker or blocked gate"
             placeholder="Jump to a worker or blocked gate…">
      <div class="palette-results" id="palette-results"></div>
    </div>
  </div>

  <div id="toasts"></div>

  <script>
    // ---------- notifications (permission requested once) ----------
    if ("Notification" in window && Notification.permission === "default") {
      document.body.addEventListener("click", function requestOnce() {
        Notification.requestPermission();
        document.body.removeEventListener("click", requestOnce);
      }, { once: true });
    }

    function escHtml(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

    // ---------- markdown: untrusted gate questions -> marked -> DOMPurify ----------
    // render.py emits the raw markdown as an escaped text node in a [data-md]
    // div; we read it back via textContent (entities decoded for us) and render
    // through marked+DOMPurify, never raw innerHTML. Re-run on every swap.
    function renderMarkdown() {
      document.querySelectorAll("[data-md]").forEach(function (el) {
        el.innerHTML = DOMPurify.sanitize(marked.parse(el.textContent));
      });
    }

    // ---------- inbox: selection + gate detail load ----------
    var selected = null;
    function applySelection() {
      document.querySelectorAll("[data-worker-id]").forEach(function (el) {
        el.classList.toggle("selected", el.dataset.workerId === selected);
      });
    }
    function select(id) {
      selected = id;
      applySelection();
      window.htmx.ajax("GET", "/worker/" + encodeURIComponent(id), { target: "#detail", swap: "innerHTML" });
    }

    // The working-tree-diff disclosure inside a gate's detail pane (lazy fetch).
    function wireDetail() {
      document.querySelectorAll("#detail details[data-diff]").forEach(function (d) {
        if (d.dataset.wired) return;
        d.dataset.wired = "1";
        d.addEventListener("toggle", function () {
          if (!d.open) return;
          var target = d.querySelector("[data-diff-target]");
          if (target.dataset.loaded) return;
          target.textContent = "Loading diff…";
          fetch("/diff/" + encodeURIComponent(target.dataset.container))
            .then(function (r) { return r.text(); })
            .then(function (text) {
              target.dataset.loaded = "1";
              target.innerHTML = text.trim()
                ? Diff2Html.html(text, { drawFileList: true, matching: "lines", outputFormat: "line-by-line", colorScheme: "dark" })
                : '<div class="detail-empty">(no changes)</div>';
            })
            .catch(function () { target.textContent = "failed to load diff"; });
        });
      });
    }

    // ---------- shared container+repo selection (Files / Diff) ----------
    var sel = { container: null, repo: "", label: null };
    var menuWrap = document.getElementById("repo-menu-wrap");
    var menuBox = menuWrap.querySelector(".repo-menu-box");
    var menuEl = document.getElementById("repo-menu");
    var repoSearch = document.getElementById("repo-search");

    function openRepoMenu(btn) {
      var r = btn.getBoundingClientRect();
      menuBox.style.left = r.left + "px";
      menuBox.style.top = (r.bottom + 4) + "px";
      menuBox.style.minWidth = Math.max(r.width, 240) + "px";
      menuWrap.classList.add("open");
      menuEl.innerHTML = '<div class="repo-empty">Loading…</div>';
      repoSearch.value = "";
      fetch("/repos").then(function (r) { return r.text(); }).then(function (html) {
        menuEl.innerHTML = html || '<div class="repo-empty">No repositories available.</div>';
      });
      repoSearch.focus();
    }
    function closeRepoMenu() { menuWrap.classList.remove("open"); }
    function filterRepoMenu(q) {
      q = q.toLowerCase();
      menuEl.querySelectorAll(".repo-item").forEach(function (it) {
        it.style.display = (!q || (it.dataset.label || "").toLowerCase().indexOf(q) >= 0) ? "" : "none";
      });
    }
    function selectRepo(container, repo, label) {
      sel.container = container; sel.repo = repo || ""; sel.label = label;
      document.querySelectorAll(".repo-picker-label").forEach(function (el) { el.textContent = label; });
      loadActivePane();
    }
    function loadActivePane() {
      var mode = document.querySelector(".app").dataset.mode;
      if (mode === "files") loadFiles();
      else if (mode === "diff") loadDiff();
    }
    repoSearch.addEventListener("input", function (e) { filterRepoMenu(e.target.value); });
    menuEl.addEventListener("click", function (e) {
      var it = e.target.closest(".repo-item");
      if (it) { selectRepo(it.dataset.container, it.dataset.repo, it.dataset.label); closeRepoMenu(); }
    });
    document.querySelectorAll(".repo-picker").forEach(function (btn) {
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        menuWrap.classList.contains("open") ? closeRepoMenu() : openRepoMenu(btn);
      });
    });
    document.addEventListener("click", function (e) {
      if (menuWrap.classList.contains("open") && !e.target.closest("#repo-menu-wrap") && !e.target.closest(".repo-picker")) {
        closeRepoMenu();
      }
    });

    // ---------- file tree (paths -> collapsible tree) ----------
    function buildPathTree(paths) {
      var root = { dirs: {}, files: [] };
      paths.forEach(function (p) {
        var parts = p.split("/");
        var node = root;
        for (var i = 0; i < parts.length - 1; i++) {
          node.dirs[parts[i]] = node.dirs[parts[i]] || { dirs: {}, files: [] };
          node = node.dirs[parts[i]];
        }
        node.files.push({ name: parts[parts.length - 1], path: p });
      });
      return root;
    }
    function renderPathTree(node) {
      var html = "";
      Object.keys(node.dirs).sort().forEach(function (d) {
        html += '<div class="tree-dir"><div class="tree-dir-head"><span class="tchev">▾</span>' + escHtml(d) + "</div>" +
                '<div class="tree-children">' + renderPathTree(node.dirs[d]) + "</div></div>";
      });
      node.files.sort(function (a, b) { return a.name.localeCompare(b.name); }).forEach(function (f) {
        html += '<div class="tree-file" data-path="' + escHtml(f.path) + '"><span class="fname">' + escHtml(f.name) + "</span></div>";
      });
      return html;
    }

    // ---------- Files panel ----------
    function loadFiles() {
      var tree = document.getElementById("files-tree");
      var view = document.getElementById("file-view");
      if (!sel.container) { tree.innerHTML = '<div class="fd-empty">Pick a container / repo above.</div>'; return; }
      tree.innerHTML = '<div class="fd-empty">Loading files…</div>';
      view.innerHTML = '<div class="fd-empty">Select a file to view it.</div>';
      fetch("/files/" + encodeURIComponent(sel.container) + "?repo=" + encodeURIComponent(sel.repo))
        .then(function (r) { return r.text(); })
        .then(function (text) {
          var paths = text.split("\n").map(function (s) { return s.trim(); }).filter(Boolean);
          if (!paths.length) { tree.innerHTML = '<div class="fd-empty">(no files)</div>'; return; }
          tree.innerHTML = renderPathTree(buildPathTree(paths));
        })
        .catch(function () { tree.innerHTML = '<div class="fd-empty">failed to load</div>'; });
    }
    document.getElementById("files-tree").addEventListener("click", function (e) {
      var dh = e.target.closest(".tree-dir-head");
      if (dh) { dh.parentNode.classList.toggle("collapsed"); return; }
      var row = e.target.closest(".tree-file");
      if (!row) return;
      this.querySelectorAll(".tree-file.active").forEach(function (x) { x.classList.remove("active"); });
      row.classList.add("active");
      openFile(row.dataset.path);
    });
    function openFile(path) {
      var view = document.getElementById("file-view");
      view.innerHTML = '<div class="fd-empty">Loading…</div>';
      fetch("/file/" + encodeURIComponent(sel.container) + "?repo=" + encodeURIComponent(sel.repo) + "&path=" + encodeURIComponent(path))
        .then(function (r) { return r.text(); })
        .then(function (text) { renderFile(path, text); })
        .catch(function () { view.innerHTML = '<div class="fd-empty">failed to load</div>'; });
    }
    // ext -> highlight.js language; unmapped/unknown falls back to auto-detect.
    var EXT_LANG = {
      js: "javascript", mjs: "javascript", cjs: "javascript", jsx: "javascript",
      ts: "typescript", tsx: "typescript", py: "python", rb: "ruby", go: "go",
      rs: "rust", java: "java", kt: "kotlin", c: "c", h: "c", cpp: "cpp", cc: "cpp",
      hpp: "cpp", cs: "csharp", php: "php", swift: "swift", scala: "scala",
      sh: "bash", bash: "bash", zsh: "bash", yml: "yaml", yaml: "yaml", json: "json",
      toml: "ini", ini: "ini", cfg: "ini", md: "markdown", markdown: "markdown",
      html: "xml", xml: "xml", svg: "xml", vue: "xml", css: "css", scss: "scss",
      less: "less", sql: "sql", lua: "lua", pl: "perl", r: "r", dart: "dart"
    };
    function extLang(path) {
      var base = path.split("/").pop().toLowerCase();
      if (base === "dockerfile") return "dockerfile";
      if (base === "makefile") return "makefile";
      var dot = base.lastIndexOf(".");
      var ext = dot > 0 ? base.slice(dot + 1) : "";
      return EXT_LANG[ext] || "";
    }
    function renderFile(path, text) {
      var view = document.getElementById("file-view");
      view.innerHTML = '<div class="file-head">' + escHtml(path) + "</div>";
      var body = document.createElement("div"); body.className = "file-body";
      if (!text) {
        body.innerHTML = '<div class="fd-empty">(empty or binary file)</div>';
        view.appendChild(body); return;
      }
      var lang = extLang(path);
      var code = document.createElement("code");
      if (lang && window.hljs && hljs.getLanguage(lang)) code.className = "language-" + lang;
      code.textContent = text;
      if (window.hljs) { try { hljs.highlightElement(code); } catch (err) { /* leave as plain text */ } }
      var pre = document.createElement("pre"); pre.className = "file-pre hljs";
      pre.appendChild(code);
      body.appendChild(pre);
      view.appendChild(body);
    }

    // ---------- Diff panel (changeset tree -> diff2html per file) ----------
    function buildFileTree(files) {
      var root = { dirs: {}, files: [] };
      files.forEach(function (f, i) {
        var name = (f.newName && f.newName !== "/dev/null") ? f.newName : f.oldName;
        var parts = String(name).split("/");
        var node = root;
        for (var p = 0; p < parts.length - 1; p++) {
          node.dirs[parts[p]] = node.dirs[parts[p]] || { dirs: {}, files: [] };
          node = node.dirs[parts[p]];
        }
        node.files.push({ name: parts[parts.length - 1], idx: i, add: f.addedLines, del: f.deletedLines });
      });
      return root;
    }
    function renderDiffTree(node) {
      var html = "";
      Object.keys(node.dirs).sort().forEach(function (d) {
        html += '<div class="tree-dir"><div class="tree-dir-head"><span class="tchev">▾</span>' + escHtml(d) + "</div>" +
                '<div class="tree-children">' + renderDiffTree(node.dirs[d]) + "</div></div>";
      });
      node.files.sort(function (a, b) { return a.name.localeCompare(b.name); }).forEach(function (f) {
        html += '<div class="tree-file" data-file-idx="' + f.idx + '"><span class="fname">' + escHtml(f.name) + "</span>" +
                '<span class="fstat"><span class="add">+' + f.add + '</span> <span class="del">-' + f.del + "</span></span></div>";
      });
      return html;
    }
    function loadDiff() {
      var tree = document.getElementById("diff-tree");
      var view = document.getElementById("diff-view");
      if (!sel.container) { tree.innerHTML = '<div class="fd-empty">Pick a container / repo above.</div>'; return; }
      tree.innerHTML = '<div class="fd-empty">Loading changes…</div>';
      view.innerHTML = '<div class="fd-empty">Select a changed file to see its diff.</div>';
      fetch("/diff/" + encodeURIComponent(sel.container) + "?repo=" + encodeURIComponent(sel.repo))
        .then(function (r) { return r.text(); })
        .then(function (text) {
          if (!text.trim()) { tree.innerHTML = '<div class="fd-empty">(no changes)</div>'; return; }
          var files = Diff2Html.parse(text);
          if (!files.length) { tree.innerHTML = '<div class="fd-empty">(no changes)</div>'; return; }
          tree._files = files;
          tree.innerHTML = renderDiffTree(buildFileTree(files));
        })
        .catch(function () { tree.innerHTML = '<div class="fd-empty">failed to load</div>'; });
    }
    document.getElementById("diff-tree").addEventListener("click", function (e) {
      var dh = e.target.closest(".tree-dir-head");
      if (dh) { dh.parentNode.classList.toggle("collapsed"); return; }
      var row = e.target.closest(".tree-file");
      if (!row) return;
      this.querySelectorAll(".tree-file.active").forEach(function (x) { x.classList.remove("active"); });
      row.classList.add("active");
      document.getElementById("diff-view").innerHTML = Diff2Html.html([this._files[+row.dataset.fileIdx]],
        { drawFileList: false, matching: "lines", outputFormat: "line-by-line", colorScheme: "dark" });
    });

    // ---------- activity bar (mode switch) ----------
    function setMode(mode) {
      document.querySelector(".app").dataset.mode = mode;
      document.querySelectorAll(".act-btn").forEach(function (b) {
        b.classList.toggle("active", b.dataset.mode === mode);
      });
      closeRepoMenu();
      if (mode === "files") loadFiles();
      else if (mode === "diff") loadDiff();
    }
    document.getElementById("activitybar").addEventListener("click", function (e) {
      var btn = e.target.closest(".act-btn");
      if (btn) setMode(btn.dataset.mode);
    });

    // ---------- clicks: worker selection, settings buttons ----------
    document.body.addEventListener("click", function (e) {
      if (e.target.closest("form")) return;               // don't hijack the answer form
      if (e.target.closest("#repo-menu-wrap, .repo-picker, .fd-tree")) return;  // panel-local handlers own these
      var node = e.target.closest("[data-worker-id]");
      if (node) { select(node.dataset.workerId); return; }
      var refreshBtn = e.target.closest("#btn-refresh, #btn-refresh-bar");
      if (refreshBtn) { doRefresh(refreshBtn); return; }
      if (e.target.id === "btn-notify" && "Notification" in window) { Notification.requestPermission(); }
    });

    // Manual reconcile poll: rescan docker (adds + prunes vanished workers).
    // The resulting shell broadcast arrives over the ws, so no swap here.
    function doRefresh(btn) {
      if (btn.dataset.busy) return;
      btn.dataset.busy = "1"; btn.classList.add("spinning");
      fetch("/refresh", { method: "POST" }).finally(function () {
        delete btn.dataset.busy; btn.classList.remove("spinning");
      });
    }

    // ---------- command palette ----------
    var pal = document.getElementById("palette");
    var palIn = document.getElementById("palette-input");
    var palRes = document.getElementById("palette-results");
    function openPalette() { pal.classList.add("open"); palIn.value = ""; renderPalette(""); palIn.focus(); }
    function closePalette() { pal.classList.remove("open"); }
    function renderPalette(q) {
      q = q.toLowerCase();
      var rows = [].slice.call(document.querySelectorAll("#inbox-list .row"));
      palRes.innerHTML = rows.map(function (r) {
        var text = r.textContent.replace(/\s+/g, " ").trim();
        return { id: r.dataset.workerId, state: r.dataset.state, text: text };
      }).filter(function (x) { return !q || x.text.toLowerCase().indexOf(q) >= 0; })
        .map(function (x, i) {
          return '<div class="presult ' + (i === 0 ? "active" : "") + '" data-id="' + x.id + '">' +
            '<span class="dot ' + x.state + '"></span><span class="rb">' + x.text + '</span>' +
            '<span class="hint">' + (x.state === "blocked" ? "gate" : x.state) + '</span></div>';
        }).join("");
    }
    palIn.addEventListener("input", function (e) { renderPalette(e.target.value); });
    palRes.addEventListener("click", function (e) {
      var r = e.target.closest(".presult");
      if (r) { setMode("inbox"); select(r.dataset.id); closePalette(); }
    });

    // ---------- keyboard ----------
    document.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault(); pal.classList.contains("open") ? closePalette() : openPalette(); return;
      }
      if (e.key === "Escape") { closePalette(); closeRepoMenu(); return; }
      if (pal.classList.contains("open") && e.key === "Enter") {
        var a = palRes.querySelector(".presult.active") || palRes.querySelector(".presult");
        if (a) { setMode("inbox"); select(a.dataset.id); closePalette(); }
        return;
      }
      var typing = /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName);
      if (!typing && (e.key === "j" || e.key === "k")) {
        var rows = [].slice.call(document.querySelectorAll("#inbox-list .row"));
        var idx = rows.findIndex(function (r) { return r.dataset.workerId === selected; });
        var next = rows[Math.max(0, Math.min(rows.length - 1, idx + (e.key === "j" ? 1 : -1)))];
        if (next) { setMode("inbox"); select(next.dataset.workerId); }
      }
    });

    // ---------- toasts ----------
    function pushToast(variant, titleText, bodyText, ttl) {
      var t = document.createElement("div");
      t.className = "toast " + variant;
      var title = document.createElement("div"); title.className = "t-title"; title.textContent = titleText;
      t.appendChild(title);
      if (bodyText) { var b = document.createElement("div"); b.className = "t-body"; b.textContent = bodyText; t.appendChild(b); }
      document.getElementById("toasts").appendChild(t);
      setTimeout(function () { t.remove(); }, ttl || 7000);
    }

    // A new block: toast + optional browser notification.
    document.body.addEventListener("groom:blocked", function (evt) {
      var body = evt.detail || "A workflow needs your input.";
      pushToast("blocked", "⛔ worker blocked", body, 7000);
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("groom: workflow blocked", { body: body });
      }
    });

    // A gate we just answered: confirm, and if that worker's detail is open,
    // re-fetch it so the answered question is dismissed. Scoped to the answered
    // worker so a half-typed answer on a different worker is never clobbered.
    document.body.addEventListener("groom:answered", function (evt) {
      pushToast("ok", "✓ answer sent", "", 3500);
      var d = evt.detail || {};
      if (d.id && d.id === selected) select(selected);
    });

    // ---------- live swaps: re-render markdown, re-apply selection, wire diffs ----------
    document.body.addEventListener("htmx:afterSwap", function () { renderMarkdown(); wireDetail(); });
    document.body.addEventListener("htmx:oobAfterSwap", function () { renderMarkdown(); applySelection(); });
    renderMarkdown();
  </script>
</body>
</html>
