<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>groom</title>
  <link rel="stylesheet" href="/assets/diff2html.min.css">
  <link rel="stylesheet" href="/assets/dashboard.css">
  <script src="/assets/htmx.min.js"></script>
  <script src="/assets/htmx-ext-ws.min.js"></script>
  <script src="/assets/marked.min.js"></script>
  <script src="/assets/purify.min.js"></script>
  <script src="/assets/diff2html.min.js"></script>
</head>
<body>
  <div class="app" data-mode="inbox" hx-ext="ws" ws-connect="/ws">
    <!-- activity bar -->
    <div id="activitybar">
      <div class="act-btn active" data-mode="inbox" title="Inbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 13h4l2 3h6l2-3h4"/><path d="M5 5h14v14H5z"/></svg>
      </div>
      <div class="act-btn" data-mode="fleet" title="Fleet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="5" rx="1"/><rect x="3" y="15" width="18" height="5" rx="1"/></svg>
      </div>
      <div class="act-btn" data-mode="changes" title="Changes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 7h10M7 7l3-3M7 7l3 3"/><path d="M17 17H7M17 17l-3-3M17 17l-3 3"/></svg>
      </div>
      <div class="act-spacer"></div>
      <div class="act-btn" data-mode="settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2"/></svg>
      </div>
    </div>

    <!-- picker -->
    <nav id="picker">
      <div class="picker-head">
        <div class="picker-title">Workers</div>
        <input class="filter" type="search" name="q"
               placeholder="Filter repos, workers, types…"
               hx-get="/search" hx-trigger="input changed delay:250ms, search" hx-swap="none">
      </div>
      <div class="tree" id="tree"><div class="empty">Connecting…</div></div>
    </nav>

    <!-- main -->
    <div id="main">
      <div id="inbox">
        <div class="pane-head">Inbox — needs you</div>
        <div class="inbox-list" id="inbox-list"></div>
      </div>
      <div id="detail"><div class="detail-empty">Select a worker to see its gate.</div></div>
    </div>

    <!-- status bar -->
    <div id="statusbar"></div>
  </div>

  <!-- command palette -->
  <div id="palette">
    <div class="palette-box">
      <input id="palette-input" type="text" placeholder="Jump to a worker or blocked gate…">
      <div class="palette-results" id="palette-results"></div>
    </div>
  </div>

  <div id="toasts"></div>

  <script>
    // ---------- notifications (permission requested once) ----------
    if ("Notification" in window && Notification.permission === "default") {
      document.body.addEventListener("click", function requestOnce() {
        Notification.requestPermission();
        document.body.removeEventListener("click", requestOnce);
      }, { once: true });
    }

    // ---------- markdown: untrusted gate questions -> marked -> DOMPurify ----------
    // render.py emits the raw markdown as an escaped text node in a [data-md]
    // div; we read it back via textContent (entities decoded for us) and render
    // through marked+DOMPurify, never raw innerHTML. Re-run on every swap.
    function renderMarkdown() {
      document.querySelectorAll("[data-md]").forEach(function (el) {
        el.innerHTML = DOMPurify.sanitize(marked.parse(el.textContent));
      });
    }

    // ---------- selection + detail load ----------
    var selected = null;
    function applySelection() {
      document.querySelectorAll("[data-worker-id]").forEach(function (el) {
        el.classList.toggle("selected", el.dataset.workerId === selected);
      });
    }
    function select(id) {
      selected = id;
      applySelection();
      window.htmx.ajax("GET", "/worker/" + encodeURIComponent(id), { target: "#detail", swap: "innerHTML" });
    }

    // ---------- diff panel (lazy fetch + diff2html, dark) ----------
    function wireDetail() {
      var mode = document.querySelector(".app").dataset.mode;
      document.querySelectorAll("#detail details[data-diff]").forEach(function (d) {
        if (!d.dataset.wired) {
          d.dataset.wired = "1";
          d.addEventListener("toggle", function () {
            if (!d.open) return;
            var target = d.querySelector("[data-diff-target]");
            if (target.dataset.loaded) return;
            target.textContent = "Loading diff…";
            fetch("/diff/" + encodeURIComponent(target.dataset.container))
              .then(function (r) { return r.text(); })
              .then(function (text) {
                target.dataset.loaded = "1";
                target.innerHTML = text.trim()
                  ? Diff2Html.html(text, { drawFileList: true, matching: "lines", outputFormat: "line-by-line", colorScheme: "dark" })
                  : '<div class="detail-empty">(no changes)</div>';
              })
              .catch(function () { target.textContent = "failed to load diff"; });
          });
        }
        if (mode === "changes" && !d.open) d.open = true;  // Changes mode: surface the diff
      });
    }

    // ---------- activity bar (mode switch) ----------
    function setMode(mode) {
      document.querySelector(".app").dataset.mode = mode;
      document.querySelectorAll(".act-btn").forEach(function (b) {
        b.classList.toggle("active", b.dataset.mode === mode);
      });
      if (mode === "settings") {
        document.getElementById("detail").innerHTML =
          '<div class="settings-panel"><h2>Settings</h2>' +
          '<div class="row-set"><button class="btn" id="btn-refresh">Rescan containers</button>' +
          '<span>Re-run the docker discovery pass.</span></div>' +
          '<div class="row-set"><button class="btn ghost" id="btn-notify">Enable notifications</button>' +
          '<span>Browser alerts when a worker blocks.</span></div></div>';
      } else if (selected) {
        wireDetail();
      }
    }
    document.getElementById("activitybar").addEventListener("click", function (e) {
      var btn = e.target.closest(".act-btn");
      if (btn) setMode(btn.dataset.mode);
    });

    // ---------- clicks: tree collapse, worker selection, settings buttons ----------
    document.body.addEventListener("click", function (e) {
      if (e.target.closest("form")) return;               // don't hijack the answer form
      var repo = e.target.closest(".repo");
      if (repo) {
        repo.classList.toggle("collapsed");
        var n = repo.nextElementSibling;
        while (n && n.classList.contains("worker")) {
          n.style.display = repo.classList.contains("collapsed") ? "none" : "";
          n = n.nextElementSibling;
        }
        return;
      }
      var node = e.target.closest("[data-worker-id]");
      if (node) { select(node.dataset.workerId); return; }
      var refreshBtn = e.target.closest("#btn-refresh, #btn-refresh-bar");
      if (refreshBtn) { doRefresh(refreshBtn); return; }
      if (e.target.id === "btn-notify" && "Notification" in window) { Notification.requestPermission(); }
    });

    // Manual reconcile poll: rescan docker (adds + prunes vanished workers).
    // The resulting shell broadcast arrives over the ws, so no swap here.
    function doRefresh(btn) {
      if (btn.dataset.busy) return;
      btn.dataset.busy = "1"; btn.classList.add("spinning");
      fetch("/refresh", { method: "POST" }).finally(function () {
        delete btn.dataset.busy; btn.classList.remove("spinning");
      });
    }

    // ---------- command palette ----------
    var pal = document.getElementById("palette");
    var palIn = document.getElementById("palette-input");
    var palRes = document.getElementById("palette-results");
    function openPalette() { pal.classList.add("open"); palIn.value = ""; renderPalette(""); palIn.focus(); }
    function closePalette() { pal.classList.remove("open"); }
    function renderPalette(q) {
      q = q.toLowerCase();
      var rows = [].slice.call(document.querySelectorAll("#inbox-list .row"));
      palRes.innerHTML = rows.map(function (r) {
        var text = r.textContent.replace(/\s+/g, " ").trim();
        return { id: r.dataset.workerId, state: r.dataset.state, text: text };
      }).filter(function (x) { return !q || x.text.toLowerCase().indexOf(q) >= 0; })
        .map(function (x, i) {
          return '<div class="presult ' + (i === 0 ? "active" : "") + '" data-id="' + x.id + '">' +
            '<span class="dot ' + x.state + '"></span><span class="rb">' + x.text + '</span>' +
            '<span class="hint">' + (x.state === "blocked" ? "gate" : x.state) + '</span></div>';
        }).join("");
    }
    palIn.addEventListener("input", function (e) { renderPalette(e.target.value); });
    palRes.addEventListener("click", function (e) {
      var r = e.target.closest(".presult");
      if (r) { select(r.dataset.id); closePalette(); }
    });

    // ---------- keyboard ----------
    document.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault(); pal.classList.contains("open") ? closePalette() : openPalette(); return;
      }
      if (e.key === "Escape") { closePalette(); return; }
      if (pal.classList.contains("open") && e.key === "Enter") {
        var a = palRes.querySelector(".presult.active") || palRes.querySelector(".presult");
        if (a) { select(a.dataset.id); closePalette(); }
        return;
      }
      var typing = /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName);
      if (!typing && (e.key === "j" || e.key === "k")) {
        var rows = [].slice.call(document.querySelectorAll("#inbox-list .row"));
        var idx = rows.findIndex(function (r) { return r.dataset.workerId === selected; });
        var next = rows[Math.max(0, Math.min(rows.length - 1, idx + (e.key === "j" ? 1 : -1)))];
        if (next) select(next.dataset.workerId);
      }
    });

    // ---------- toasts ----------
    function pushToast(variant, titleText, bodyText, ttl) {
      var t = document.createElement("div");
      t.className = "toast " + variant;
      var title = document.createElement("div"); title.className = "t-title"; title.textContent = titleText;
      t.appendChild(title);
      if (bodyText) { var b = document.createElement("div"); b.className = "t-body"; b.textContent = bodyText; t.appendChild(b); }
      document.getElementById("toasts").appendChild(t);
      setTimeout(function () { t.remove(); }, ttl || 7000);
    }

    // A new block: toast + optional browser notification.
    document.body.addEventListener("groom:blocked", function (evt) {
      var body = evt.detail || "A workflow needs your input.";
      pushToast("blocked", "⛔ worker blocked", body, 7000);
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("groom: workflow blocked", { body: body });
      }
    });

    // A gate we just answered: confirm, and if that worker's detail is open,
    // re-fetch it so the answered question is dismissed (shows remaining gates
    // or the "no open gate" state). Scoped to the answered worker so a
    // half-typed answer on a different worker is never clobbered.
    document.body.addEventListener("groom:answered", function (evt) {
      pushToast("ok", "✓ answer sent", "", 3500);
      var d = evt.detail || {};
      if (d.id && d.id === selected) select(selected);
    });

    // ---------- live swaps: re-render markdown, re-apply selection, wire diffs ----------
    document.body.addEventListener("htmx:afterSwap", function () { renderMarkdown(); wireDetail(); });
    document.body.addEventListener("htmx:oobAfterSwap", function () { renderMarkdown(); applySelection(); });
    renderMarkdown();
  </script>
</body>
</html>
