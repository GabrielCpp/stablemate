react-router-web:
  description: Seed a React Router web app folder with a curated .gitignore.
  params:
    dir: web
  tree:
    $dir/.gitignore: |
      # Dependencies
      node_modules/

      # Build output
      dist/
      build/
      .react-router/
      *.tsbuildinfo

      # Environment
      .env
      .env.*

      # Logs
      *.log
      npm-debug.log*

      # OS / IDE
      .DS_Store
      .idea/
      .vscode/
