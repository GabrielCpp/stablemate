flutter-app:
  description: Seed a Flutter app folder with a curated .gitignore.
  params:
    dir: app
  tree:
    $dir/.gitignore: |
      # Miscellaneous
      *.class
      *.log
      *.swp
      .DS_Store
      .atom/
      .build/
      .buildlog/
      .history
      .svn/
      .swiftpm/
      migrate_working_dir/

      # IntelliJ related
      *.iml
      *.ipr
      *.iws
      .idea/

      # Flutter/Dart/Pub related
      **/doc/api/
      **/ios/Flutter/.last_build_id
      .dart_tool/
      .flutter-plugins-dependencies
      .pub-cache/
      .pub/
      /build/
      /coverage/

      # Symbolication / obfuscation related
      app.*.symbols
      app.*.map.json

      # Android build artifacts
      /android/app/debug
      /android/app/profile
      /android/app/release

      # Environment
      .env*

      # Scratch
      tmp
