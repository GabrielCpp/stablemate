name: research

# setup.py runs `uv sync` with check=False, which tolerates a failing sync but NOT a
# missing binary — absent, it raises FileNotFoundError and takes the node down. A
# preflight turns that mid-run crash into a message before anything starts.
requires:
  - cmd: uv

# Single, program-agnostic autonomous-research workflow.
#
# One gate-loop engine drives ANY research program: pick the next gate from the
# program's README ladder, implement the experiment, gate-check it against the gate
# doc's exact criteria, rework on failure (bounded), record the outcome, and — on a
# kill — hand off to a research lead that either revives the gate (killed for the
# wrong reason) or defines a new direction (killed for the right reason).
#
# SELF-EXTENSION: the loop does NOT terminate just because the ladder is exhausted.
# When every reachable gate is PASS, an opus research lead (`lead_goal_review`) judges
# the program against its OWN North star (read from the program README / manifest
# `goal:`, never a hardcoded goal) and routes: `reached` → done; `impossible` →
# recorded negative, done; `extend` → append the next gate and loop. The program keeps
# growing toward its North star until the lead calls it reached or impossible
# (max_extensions is only a runaway backstop).
#
# PROGRAM SELECTION is relative to the directory the run is launched from. `load_config`
# walks UP from the launch dir ($AGENT_LAUNCH_DIR, else $PWD) to the repo root and picks
# the nearest enclosing `program.yml` (1 folder = 1 program). Precedence:
#   1. explicit  — --params '{"program":"specs/<dir>"}' or $RESEARCH_PROGRAM
#   2. launch dir — cd into the program folder (or point AGENT_LAUNCH_DIR at it)
#   3. pointer    — <repo>/.agents/program (back-compat default)
# Per-program config (code_root, progress_path, result_branch, goal) lives co-located
# with the folder as a flat `<program_dir>/program.yml`. There is no library-side JSON
# registry. Repo-level concerns (repo_url/repo_branch) belong to the launcher, not a
# program, and are sourced by `setup` from env/Make vars.
vars:
  # Which research program to run, as a repo-relative dir. Empty here so the repo's
  # committed .agents/program pointer selects; override per run with
  # --params '{"program": "specs/<dir>"}'.
  program: ""
  # Engine-level caps. Enforced as literals in the guard branches below (branch
  # condition values can't be Jinja), so keep these comments in sync if you change
  # the literals: max_reworks == guard_rework "3"; max_lead_reviews == guard_lead_review
  # "4"; max_extensions == guard_extend "6". max_extensions bounds program
  # self-extension (the lead's reached/impossible verdict is the intended stop; this is
  # only the runaway backstop, so keep it generous).
  max_reworks: "3"
  max_lead_reviews: "4"
  max_extensions: "6"

start: setup

nodes:
  # ── Setup: clone (or use in-place) the repo ────────────────────────────────
  # Runs first so the in-repo program manifest is on disk before load_config reads
  # it (both native in-place and Docker clone). repo_url/repo_branch come from the
  # launcher env/Make vars (setup.sh honors REPO_URL/REPO_BRANCH), not from cfg.
  - id: setup
    type: script
    script: scripts/setup.py
    args: []
    outputs:
      - key: setup_result
    next: load_config

  # ── Load program config → cfg ──────────────────────────────────────────────
  # Reads <repo>/<program_dir>/program.yml from the checkout setup produced.
  - id: load_config
    type: script
    script: scripts/load_config.py
    args:
      - "{{ program }}"
      - "{{ setup_result.repo_dir }}"
    outputs:
      - key: cfg
    next: init_lead_counter

  - id: init_lead_counter
    type: script
    script: scripts/init_lead_counter.py
    outputs:
      - key: lead_review_count
    next: init_extend_counter

  - id: init_extend_counter
    type: script
    script: scripts/init_extend_counter.py
    outputs:
      - key: extend_count
    next: select_gate

  # ── Pick the next gate ─────────────────────────────────────────────────────
  - id: select_gate
    type: agent
    # haiku: reads the program README ladder + progress and picks the next gate id —
    # bounded selection over existing docs, no deep reasoning needed.
    model: { claude: haiku }
    prompt: prompts/select-next-gate.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
    outputs:
      - key: gate_selection
    next: route_gate

  - id: route_gate
    type: branch
    path: gate_selection.gate_id
    cases:
      none: lead_goal_review   # ladder exhausted: don't terminate — let the lead judge the North star
    default: check_killed_pre

  - id: check_killed_pre
    type: branch
    path: gate_selection.program_killed
    cases:
      "true": lead_review     # a pre-existing kill: let the research lead judge it, don't just die
    default: reset_rework

  - id: reset_rework
    type: script
    script: scripts/init_rework_counter.py
    outputs:
      - key: rework_count
    next: implement

  # ── Implement ──────────────────────────────────────────────────────────────
  - id: implement
    type: agent
    prompt: prompts/implement-experiment.md
    # 20 min wall-clock (also the engine default): implementing an experiment runs
    # the program's measurement — a multi-map/multi-seed benchmark — which the old
    # 600s ceiling could not fit. Stated here so the budget is explicit at the node.
    # It's surfaced to the prompt (node_timeout_min) so the agent sizes its runs to
    # finish — a turn killed at the budget restarts the node from scratch.
    timeout: 5400
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      code_root: "{{ cfg.code_root }}"
      gate_id: "{{ gate_selection.gate_id }}"
      gate_doc_path: "{{ gate_selection.gate_doc_path }}"
    outputs:
      - key: impl_result
    next: gate_check

  # ── Gate check (independent reviewer) ──────────────────────────────────────
  - id: gate_check
    type: agent
    prompt: prompts/gate-check.md
    # 20 min wall-clock: the reviewer re-runs the measurement over the FULL seed set
    # — the most expensive run in the loop — so it gets the full implement budget.
    timeout: 5400
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      gate_id: "{{ gate_selection.gate_id }}"
      gate_doc_path: "{{ gate_selection.gate_doc_path }}"
    outputs:
      - key: gate_check
    next: decide_gate

  - id: decide_gate
    type: branch
    path: gate_check.status
    cases:
      approved: record
      killed: record_kill
      needs_rework: guard_rework
    default: guard_rework

  # ── Bounded rework loop ────────────────────────────────────────────────────
  - id: guard_rework
    type: branch
    path: rework_count.value
    conditions:
      - op: ">="
        value: "3"          # == vars.max_reworks; literal so no Jinja in branch
        next: escalate
    default: do_rework

  - id: do_rework
    type: agent
    prompt: prompts/rework-experiment.md
    # 20 min wall-clock: same as implement — rework re-runs the measurement.
    timeout: 5400
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      code_root: "{{ cfg.code_root }}"
      gate_id: "{{ gate_selection.gate_id }}"
      failed_criteria: "{{ gate_check.failed_criteria }}"
      notes: "{{ gate_check.notes }}"
      rework_count: "{{ rework_count.value }}"
    outputs:
      - key: impl_result
    next: incr_rework

  - id: incr_rework
    type: script
    script: scripts/incr_rework.py
    args:
      - "{{ rework_count.value }}"
    outputs:
      - key: rework_count
    next: gate_check

  # ── Record outcomes ────────────────────────────────────────────────────────
  - id: record
    type: agent
    # haiku: writes the gate outcome to the progress file — mechanical bookkeeping.
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "{{ gate_selection.gate_id }}"
    outputs:
      - key: record_result
    next: publish_loop

  - id: record_kill
    type: agent
    # haiku: writes the kill outcome to the progress file — mechanical bookkeeping.
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "{{ gate_selection.gate_id }}"
    outputs:
      - key: record_result
    next: lead_review        # don't terminate on a kill — hand off to the research lead

  - id: escalate
    type: agent
    # haiku: writes the forced FAIL_MAX_REWORKS outcome — mechanical bookkeeping.
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "{{ gate_selection.gate_id }}"
      forced_outcome: "FAIL_MAX_REWORKS"
    outputs:
      - key: record_result
    next: publish_dead

  # ── Research-lead handoff ────────────────────────────────────────────────
  # A gate was killed (freshly via record_kill, or detected pre-existing via
  # check_killed_pre). The research lead judges whether the kill was scientifically
  # sound, then either submits the gate back (revive) or defines a new direction.
  - id: lead_review
    type: agent
    # opus: the research lead — judges whether a kill was scientifically right or the
    # gate was killed for the wrong reason. The program's direction turns on this call,
    # so it's worth the stronger reasoning (mirrors epic-coder's opus review_plan gate).
    model: { claude: opus, codex: "@gpt-5.5" }
    prompt: prompts/research-lead-review.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      goal: "{{ cfg.goal }}"
      gate_id: "{{ gate_selection.gate_id }}"
      gate_doc_path: "{{ gate_selection.gate_doc_path }}"
      failed_criteria: "{{ gate_check.failed_criteria }}"
      notes: "{{ gate_check.notes }}"
    outputs:
      - key: lead_review
    next: guard_lead_review

  - id: guard_lead_review
    type: branch
    path: lead_review_count.value
    conditions:
      - op: ">="
        value: "4"          # == vars.max_lead_reviews; literal so no Jinja in branch
        next: lead_halt
    default: route_lead_verdict

  - id: route_lead_verdict
    type: branch
    path: lead_review.verdict
    cases:
      revive: revive_gate
      new_direction: set_new_direction
    default: lead_halt

  - id: revive_gate
    type: agent
    # opus: acts on the lead's verdict to revive a wrongly-killed gate — a
    # course-correcting decision, kept on the same tier as the lead_review that drove it.
    model: { claude: opus, codex: "@gpt-5.5" }
    prompt: prompts/revive-gate.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "{{ gate_selection.gate_id }}"
      gate_doc_path: "{{ gate_selection.gate_doc_path }}"
      lead_review: "{{ lead_review }}"
    outputs:
      - key: revive_result
    next: incr_lead_review

  - id: set_new_direction
    type: agent
    # opus: defines a new research direction after a justified kill — the most
    # open-ended, high-leverage call in the loop, so it runs on the strongest tier.
    model: { claude: opus, codex: "@gpt-5.5" }
    prompt: prompts/define-new-direction.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      goal: "{{ cfg.goal }}"
      gate_id: "{{ gate_selection.gate_id }}"
      gate_doc_path: "{{ gate_selection.gate_doc_path }}"
      lead_review: "{{ lead_review }}"
    outputs:
      - key: new_direction_result
    next: incr_lead_review

  - id: incr_lead_review
    type: script
    script: scripts/incr_lead_review.py
    args:
      - "{{ lead_review_count.value }}"
    outputs:
      - key: lead_review_count
    next: publish_loop

  - id: lead_halt
    type: agent
    # haiku: writes the forced HALTED_LEAD_REVIEW_BUDGET outcome — mechanical bookkeeping.
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "{{ gate_selection.gate_id }}"
      forced_outcome: "HALTED_LEAD_REVIEW_BUDGET"
    outputs:
      - key: record_result
    next: publish_dead

  # ── Self-extension: ladder exhausted → judge the North star ────────────────
  # Reached when every reachable gate is PASS/WEAK_PASS. The lead judges the program
  # against its OWN North star (read from the program README / manifest goal) and
  # routes: reached (done), impossible (recorded negative, done), or extend (append the
  # next gate and loop). The lead's verdict is the intended stop; max_extensions is only
  # a runaway backstop.
  - id: lead_goal_review
    type: agent
    # opus: the highest-leverage call in the loop — decides whether the program is done,
    # dead, or must grow. Same tier as the kill-review lead.
    model: { claude: opus, codex: "@gpt-5.5" }
    prompt: prompts/lead-goal-review.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      code_root: "{{ cfg.code_root }}"
      goal: "{{ cfg.goal }}"
    outputs:
      - key: goal_review
    next: guard_extend

  - id: guard_extend
    type: branch
    path: extend_count.value
    conditions:
      - op: ">="
        value: "6"          # == vars.max_extensions; literal so no Jinja in branch
        next: goal_halt
    default: route_goal_verdict

  - id: route_goal_verdict
    type: branch
    path: goal_review.verdict
    cases:
      reached: record_reached
      impossible: record_impossible
      extend: extend_program
    default: goal_halt

  - id: extend_program
    type: agent
    # opus: writes the next gate (ladder + gate doc + progress) — defines new science,
    # so it stays on the strongest tier alongside the goal review that drove it.
    model: { claude: opus, codex: "@gpt-5.5" }
    prompt: prompts/extend-program.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      code_root: "{{ cfg.code_root }}"
      goal: "{{ cfg.goal }}"
      goal_review: "{{ goal_review }}"
    outputs:
      - key: extend_result
    next: incr_extend

  - id: incr_extend
    type: script
    script: scripts/incr_extend.py
    args:
      - "{{ extend_count.value }}"
    outputs:
      - key: extend_count
    next: publish_loop        # back to select_gate; the new gate is now the lowest non-PASS

  # ── Goal terminals (record the verdict, publish, then end) ─────────────────
  - id: record_reached
    type: agent
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "GOAL"
      gate_doc_path: "{{ cfg.program_dir }}/README.md"
      forced_outcome: "GOAL_REACHED"
    outputs:
      - key: record_result
    next: publish_done

  - id: record_impossible
    type: agent
    # impossible is a valid scientific conclusion (a recorded negative), not an apparatus
    # failure — so it writes a finding and terminates CLEAN (done), unlike program_dead.
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "GOAL"
      gate_doc_path: "{{ cfg.program_dir }}/README.md"
      forced_outcome: "GOAL_IMPOSSIBLE"
    outputs:
      - key: record_result
    next: publish_done

  - id: goal_halt
    type: agent
    # extension budget exhausted without a reached/impossible verdict — inconclusive
    # stop, mirrors lead_halt (→ program_dead).
    model: { claude: haiku }
    prompt: prompts/record-result.md
    args:
      repo_dir: "{{ setup_result.repo_dir }}"
      program_dir: "{{ cfg.program_dir }}"
      progress_path: "{{ cfg.progress_path }}"
      gate_id: "GOAL"
      gate_doc_path: "{{ cfg.program_dir }}/README.md"
      forced_outcome: "HALTED_EXTENSION_BUDGET"
    outputs:
      - key: record_result
    next: publish_dead

  # ── Publish (push results out of the container) ────────────────────────────
  - id: publish_loop
    type: script
    script: scripts/publish.py
    args:
      - "{{ setup_result.repo_dir }}"
      - "{{ cfg.result_branch }}"
      - "{{ cfg.program_dir }}"
    outputs:
      - key: publish_result
    next: select_gate

  - id: publish_dead
    type: script
    script: scripts/publish.py
    args:
      - "{{ setup_result.repo_dir }}"
      - "{{ cfg.result_branch }}"
      - "{{ cfg.program_dir }}"
    outputs:
      - key: publish_result
    next: program_dead

  # Clean terminal for a recorded goal verdict (reached or impossible): publish, end ok.
  - id: publish_done
    type: script
    script: scripts/publish.py
    args:
      - "{{ setup_result.repo_dir }}"
      - "{{ cfg.result_branch }}"
      - "{{ cfg.program_dir }}"
    outputs:
      - key: publish_result
    next: done

  # ── Terminals ──────────────────────────────────────────────────────────────
  - id: done
    type: terminal

  - id: program_dead
    type: fail
