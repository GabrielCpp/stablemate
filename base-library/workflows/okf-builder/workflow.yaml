name: okf-builder
# Exhaustively build a service's OKF book from its code. Entry-point-first: seed the
# surfaces, then drain a typed worklist where each item's investigation spawns the deeper
# items it reveals (surface -> elements -> handler layer -> callee layers -> concepts/
# formats), descending the code layer by layer and classifying every finding. When the
# drain is dry, a deterministic checkpoint (ostler fmt + doctor) and an agent coverage
# re-scan (orphans / stubs / missing-from-code / journeys) queue anything missed and loop,
# until the book is complete. Resumable + fail-soft via workhorse's checkpoint + gas tank.
#
#   workhorse run okf-builder --params '{"service":"workhorse","source_path":"workhorse"}'

# Script nodes import ostler in-process, so what matters is that it is importable by
# the interpreter running them — a PATH shim doesn't prove that (a pipx-isolated
# install gives a working `ostler` command whose package `import ostler` can't see).
requires:
  - dist: ostler
    version: ">=0.1.0"

vars:
  service: "" # which docs/features/<service> to build; "" = the whole docs/features tree
  # Source subtree to inventory. Defaults to `service`, which keeps the common one-repo/one-book
  # case terse while allowing monorepos to run once per codebase into sibling books.
  source_path: ""
  # Comma-separated paths relative to source_path that are not part of this service book
  # (tests, generated output, repo tooling, historical capture utilities, and similar).
  source_excludes: ""
  # Resume/repair an already-populated book at checkpoint + coverage without rediscovering roots.
  recheck_only: "no"
  docs_path: "" # repo/docs root; "" -> AGENT_REPO_DIR
  round: "0" # checkpoint round counter — counts doctor/fixup re-drains, reported not bounded
  rescan_round: "0" # coverage re-scan counter — the one `guard_rounds` bounds
  # OPTIONAL safety valve, NOT the stop condition. 0 = run to convergence (the intended mode:
  # the build ends when the code inventory is fully covered + doctor is green). Set >0 only to
  # bound a small practice/quota-limited run. Runaway is guarded by the gas tank + round cap,
  # not by this.
  max_items: "0"

start: prepare

nodes:
  - id: prepare
    type: script
    script: scripts/prepare.py
    args:
      - "{{ docs_path }}"
      - "{{ service }}"
      - "{{ source_path }}"
      - "{{ source_excludes }}"
    outputs:
      - key: worklist_path
      - key: features_root
      - key: repo_root
      - key: source_root
      - key: source_excludes
      - key: service
      - key: ostler_ok
      - key: done_baseline
      - key: worklist_reset
      - key: prepare_error
    next: check_ostler

  # No ostler, no graph, or an unusable source root -> the run cannot measure anything it
  # would go on to claim. That is a failure, not a quiet exit: a build that documents nothing
  # because its instrument is missing must not be indistinguishable from a build that is done.
  - id: check_ostler
    type: branch
    path: ostler_ok
    cases:
      "yes": decide_start
      "no": cannot_build
    default: cannot_build

  - id: decide_start
    type: branch
    path: recheck_only
    cases:
      "yes": checkpoint
    default: enumerate_surfaces

  # Seed: identify every entry-point surface from the code (their internals are discovered
  # later by the drain loop).
  - id: enumerate_surfaces
    type: agent
    power: medium
    prompt: prompts/enumerate-surfaces.md
    cwd: "{{ repo_root }}"
    add_dirs: "{{ repo_root }}"
    args:
      service: "{{ service }}"
      features_root: "{{ features_root }}"
      repo_root: "{{ repo_root }}"
      source_root: "{{ source_root }}"
      source_excludes: "{{ source_excludes }}"
    outputs:
      - key: discovered
        default: []
    next: seed_surfaces

  - id: seed_surfaces
    type: script
    script: scripts/record.py
    args:
      - "{{ worklist_path }}"
      - "" # no current item to close
      - "{{ get_node_output('enumerate_surfaces', 'discovered') | tojson }}"
    outputs:
      - key: done_count
      - key: pending_count
      - key: added
    next: select_item

  # ── Drain loop ────────────────────────────────────────────────────────────────────
  - id: select_item
    type: script
    script: scripts/select-item.py
    args:
      - "{{ worklist_path }}"
      - "{{ max_items }}"
      - "{{ done_baseline }}" # `max_items` bounds THIS run, not the worklist's lifetime
    outputs:
      - key: has_item
      - key: over_budget
      - key: current_item
      - key: item_kind
      - key: item_target
      - key: item_context
      - key: pending_count
      - key: done_count
      - key: done_this_run
    # Refuel the gas tank on real progress (an item completed since the last visit); a
    # loop that stops completing items runs the tank dry and halts instead of spinning.
    refuel: done_count
    next: guard_budget

  # Hard quota ceiling for an unattended run: over budget -> canonicalize the partial book
  # and stop, rather than keep spending agent turns. Pending items survive for a resume.
  - id: guard_budget
    type: branch
    path: over_budget
    cases:
      "yes": finalize
      "no": decide_item
    default: decide_item

  - id: decide_item
    type: branch
    path: has_item
    cases:
      "yes": investigate
      "no": checkpoint # drain dry -> converge
    default: checkpoint

  # Over budget: canonicalize what was built, then exit NON-ZERO. `max_items` is a safety
  # valve, not the stop condition — a run that stopped because it ran out of allowance did not
  # converge, and the partial book it leaves behind must not read as a finished one. Pending
  # items survive for a resume, which now gets its own allowance (see `done_baseline`).
  - id: finalize
    type: script
    script: scripts/checkpoint.py
    args:
      - "{{ repo_root }}"
      - "{{ features_root }}"
      - "{{ round }}"
    outputs:
      - key: checkpoint_clean
      - key: doctor_output
      - key: round
      - key: fixup_items
    next: budget_exhausted

  # The heart: document ONE item to the spec-complete bar and return the deeper items it
  # reveals (elements, code layers, concepts, formats, journeys, fixups).
  - id: investigate
    type: agent
    power: medium
    prompt: prompts/investigate.md
    cwd: "{{ repo_root }}"
    add_dirs: "{{ repo_root }}"
    args:
      item_kind: "{{ item_kind }}"
      item_target: "{{ item_target }}"
      item_context: "{{ item_context }}"
      service: "{{ service }}"
      features_root: "{{ features_root }}"
      repo_root: "{{ repo_root }}"
      source_root: "{{ source_root }}"
      source_excludes: "{{ source_excludes }}"
    outputs:
      - key: discovered
        default: []
      - key: doc_status
        default: skipped
    next: record

  - id: record
    type: script
    script: scripts/record.py
    args:
      - "{{ worklist_path }}"
      - "{{ get_node_output('select_item', 'current_item') }}"
      - "{{ get_node_output('investigate', 'discovered') | tojson }}"
    outputs:
      - key: done_count
      - key: pending_count
      - key: added
    next: select_item

  # ── Convergence: mechanical gate, then the exhaustiveness re-scan ───────────────────
  - id: checkpoint
    type: script
    script: scripts/checkpoint.py
    args:
      - "{{ repo_root }}"
      - "{{ features_root }}"
      - "{{ round }}"
    outputs:
      - key: checkpoint_clean
      - key: doctor_output
      - key: round
      - key: fixup_items
    next: decide_checkpoint

  - id: decide_checkpoint
    type: branch
    path: checkpoint_clean
    cases:
      "yes": guard_rounds
      "no": seed_fixup # doctor dirty -> queue a fixup item and drain it
    # Pessimistic: an unreadable verdict means "not clean". The `yes` case is the only way
    # past the gate, because a value nobody can parse is not evidence the book is healthy.
    default: seed_fixup

  - id: seed_fixup
    type: script
    script: scripts/record.py
    args:
      - "{{ worklist_path }}"
      - ""
      - "{{ get_node_output('checkpoint', 'fixup_items') }}"
    outputs:
      - key: done_count
      - key: pending_count
      - key: added
    next: select_item

  # Bound the re-scan on `rescan_round`, which only `compute_coverage` increments, NOT on
  # `round`, which `checkpoint` bumps on every doctor pass including the fixup re-drains. Those
  # are two different loops sharing one counter: a build that took 40 fixup rounds to get doctor
  # green arrived here with round=41 and failed on its FIRST clean checkpoint, having never run
  # a single coverage re-scan. The cap read as "the coverage check would not converge" about a
  # check that had not yet run once.
  #
  # Bound the re-scan so an unconverging coverage check can't loop forever. Exhausting the
  # cap is NOT convergence: the run gave up with the book still short, and it says so with a
  # non-zero exit. Reporting that identically to a finished book is what made "complete" a
  # word the run could not be held to.
  - id: guard_rounds
    type: branch
    path: rescan_round
    conditions:
      - op: ">="
        value: "6" # == a sane max of dry-drain re-scans
        next: rounds_exhausted
    default: inventory_source

  # Materialize the source side of the coverage diff mechanically. The recheck agent judges
  # whether a symbol is folded into a larger documented contract, but it never invents or samples
  # the list it is comparing against.
  - id: inventory_source
    type: script
    script: scripts/inventory-source.py
    args:
      - "{{ source_root }}"
      - "{{ worklist_path }}.source.json"
      - "{{ source_excludes }}"
      - "{{ repo_root }}"
    outputs:
      - key: source_inventory_path
      - key: source_unit_count
      - key: operational_unit_count
      - key: inventory_errors
    next: compute_coverage

  # The verdict, computed. `ostler coverage` joins the book's `code:` citations against the
  # inventory and this node emits the result — replacing the value the `recheck` agent used to
  # emit about its own work. Also writes the book's coverage.json (the delta build's anchor).
  - id: compute_coverage
    type: script
    script: scripts/compute-coverage.py
    args:
      - "{{ repo_root }}"
      - "{{ features_root }}"
      - "{{ service }}"
      - "{{ source_inventory_path }}"
      - "{{ features_root }}/coverage-waivers.json"
      - "{{ rescan_round }}"
    outputs:
      - key: rescan_round
      - key: coverage_complete
      - key: missing_count
      - key: missing_path
      - key: coverage_path
      - key: coverage_summary
      - key: coverage_error
    next: decide_coverage

  - id: decide_coverage
    type: branch
    path: coverage_complete
    cases:
      "yes": run_walkthrough_web # book complete -> walk it live (a no-op for non-web services)
      "no": recheck
    # Pessimistic: anything but a computed "yes" is "not done". The old default sent an
    # unrecognized value ("Yes", "true", "partial") straight to the walk and then to `done` —
    # the branch surrendering on exactly the malformed verdict the output default protected.
    default: recheck

  # The agent's role, narrowed: it no longer votes on completeness. It receives the COMPUTED
  # missing list and adjudicates only the ambiguous rows — a helper folded into a documented
  # contract, a deliberate non-unit — recording each verdict with a reason in the committed
  # waivers file, and queueing the rest as real work.
  - id: recheck
    type: agent
    power: medium
    prompt: prompts/recheck-coverage.md
    cwd: "{{ repo_root }}"
    add_dirs: "{{ repo_root }}"
    args:
      service: "{{ service }}"
      features_root: "{{ features_root }}"
      repo_root: "{{ repo_root }}"
      source_root: "{{ source_root }}"
      source_excludes: "{{ source_excludes }}"
      source_inventory_path: "{{ source_inventory_path }}"
      inventory_errors: "{{ inventory_errors }}"
      missing_path: "{{ missing_path }}"
      missing_count: "{{ missing_count }}"
      coverage_summary: "{{ coverage_summary }}"
      coverage_error: "{{ coverage_error }}"
      waivers_path: "{{ features_root }}/coverage-waivers.json"
    outputs:
      - key: discovered
        default: []
      - key: needs_journeys
        default: "no"
    next: seed_recheck

  - id: seed_recheck
    type: script
    script: scripts/record.py
    args:
      - "{{ worklist_path }}"
      - ""
      - "{{ get_node_output('recheck', 'discovered') | tojson }}"
    outputs:
      - key: done_count
      - key: pending_count
      - key: added
    next: select_item

  # ── Walkthrough phase (live-app rediscovery) ────────────────────────────────────────
  # Once the code-derived book is complete, walk the running app to prove & heal it. The
  # walk lives in the `walkthrough-web` flow (below) so it is ALSO runnable standalone against
  # an already-built book:  workhorse run okf-builder walkthrough-web --params '{"service":"x"}'
  # (a future `walkthrough-mobile` flow will cover native/mobile surfaces the same way.)
  - id: run_walkthrough_web
    type: flow
    name: walkthrough-web
    args:
      service: "{{ service }}"
      docs_path: "{{ docs_path }}"
      source_path: "{{ source_path }}"
      max_items: "{{ max_items }}"
    next: done

  - id: done
    type: terminal

  # ── Failure exits ───────────────────────────────────────────────────────────────────
  # Until these existed, EVERY path out of this workflow was `done`: no ostler, over budget,
  # rounds exhausted and an unparseable coverage verdict all exited 0, so "the build finished"
  # and "the build gave up" were the same observation. A gate may only report a pass it can
  # show its work for; these are where it reports the alternative.
  - id: cannot_build
    type: fail

  - id: rounds_exhausted
    type: fail

  - id: budget_exhausted
    type: fail

# ── Flows ───────────────────────────────────────────────────────────────────────────────
flows:
  # Walk a WEB-app service the way a real user would — entering at the documented front door
  # and moving by clicking, never by URL — to prove the code-derived book against the running
  # app and heal it from what it sees. Web-app-ness and the launch recipe (entry URL, port,
  # health path, launch command) are all DETECTED FROM THE DOCS by detect-webapp, so the flow
  # is self-contained and standalone-invokable:
  #   workhorse run okf-builder walkthrough-web --params '{"service":"groom"}'
  # (native/mobile surfaces will get a sibling `walkthrough-mobile` flow.)
  walkthrough-web:
    name: walkthrough-web
    start: detect_webapp
    vars:
      service: null      # required — which docs/features/<service> to walk
      docs_path: ""      # docs repo root; "" -> AGENT_REPO_DIR
      source_path: ""    # source subtree; defaults to service
      max_items: "0"     # per-walk investigation ceiling (0 = converge)
    nodes:
      - id: detect_webapp
        type: script
        script: scripts/detect-webapp.py
        args:
          - "{{ docs_path }}"
          - "{{ service }}"
          - "{{ source_path }}"
        outputs:
          - key: is_webapp
          - key: repo_root
          - key: source_root
          - key: features_root
          - key: entry_url
          - key: launch_cmd
          - key: health_path
          - key: app_cwd
          - key: app_identity
          - key: stop_cmd
          - key: boot_timeout
          - key: wt_worklist_path
          - key: screenshots_dir
          - key: cdp_url # the shared browser's CDP endpoint (MCP + ostler vet)
          - key: round # reset to 0 so the walk's round-cap is its own
        next: gate_webapp

      - id: gate_webapp
        type: branch
        path: is_webapp
        cases:
          "yes": boot_app
          "no": wt_done # CLI/library service -> nothing to walk, clean skip
        default: wt_done

      - id: boot_app
        type: script
        script: scripts/boot-app.py
        args:
          - "{{ launch_cmd }}"
          - "{{ entry_url }}"
          - "{{ health_path }}"
          - "{{ app_cwd }}"
          - "{{ repo_root }}"
          - "{{ app_identity }}"
          - "{{ boot_timeout }}"
        outputs:
          - key: boot_ok
          - key: entry_url # resolved/echoed
          - key: app_pid
          - key: app_pgid
        next: decide_boot

      - id: decide_boot
        type: branch
        path: boot_ok
        cases:
          "yes": boot_browser
          "no": wt_done # app wouldn't come up -> fail soft; boot reaped what it spawned
        default: wt_done

      # The shared CDP browser: the agent's playwright MCP (--cdp-endpoint) and
      # `ostler vet --cdp-url` both attach to this one Chromium, so vet scans the very
      # page the agent drove. Booted here (not by the MCP) so it outlives agent turns.
      - id: boot_browser
        type: script
        script: scripts/boot-browser.py
        args:
          - "{{ cdp_url }}"
          - "{{ repo_root }}"
        outputs:
          - key: browser_ok
          - key: cdp_url # resolved/echoed
          - key: browser_pid
          - key: browser_pgid
        next: decide_browser

      - id: decide_browser
        type: branch
        path: browser_ok
        cases:
          "yes": seed_walkthrough
          "no": teardown_app # no browser -> nothing to walk, but still reap the app
        default: teardown_app

      - id: seed_walkthrough
        type: script
        script: scripts/seed-walkthrough.py
        args:
          - "{{ wt_worklist_path }}"
          - "{{ service }}"
          - "{{ repo_root }}"
        outputs:
          - key: done_count
          - key: pending_count
          - key: added
        next: select_wt

      # ── Walk drain loop (journeys are the unit) ─────────────────────────────────────
      - id: select_wt
        type: script
        script: scripts/select-item.py
        args:
          - "{{ wt_worklist_path }}"
          - "{{ max_items }}"
        outputs:
          - key: has_item
          - key: over_budget
          - key: current_item
          - key: item_kind
          - key: item_target
          - key: item_context
          - key: pending_count
          - key: done_count
        refuel: done_count
        next: guard_wt_budget

      - id: guard_wt_budget
        type: branch
        path: over_budget
        cases:
          "yes": teardown_app # ceiling hit -> stop walking, but always reap the app
          "no": decide_wt_item
        default: decide_wt_item

      - id: decide_wt_item
        type: branch
        path: has_item
        cases:
          "yes": walkthrough_turn
          "no": wt_checkpoint # drain dry -> converge
        default: wt_checkpoint

      - id: walkthrough_turn
        type: agent
        power: high
        prompt: prompts/walkthrough-web.md
        cwd: "{{ repo_root }}"
        add_dirs: "{{ repo_root }}"
        args:
          item_kind: "{{ item_kind }}"
          item_target: "{{ item_target }}"
          item_context: "{{ item_context }}"
          service: "{{ service }}"
          features_root: "{{ features_root }}"
          repo_root: "{{ repo_root }}"
          entry_url: "{{ entry_url }}"
          screenshots_dir: "{{ screenshots_dir }}"
          cdp_url: "{{ cdp_url }}"
        outputs:
          - key: discovered
            default: []
          - key: walk_status
            default: skipped
        next: record_wt

      - id: record_wt
        type: script
        script: scripts/record.py
        args:
          - "{{ wt_worklist_path }}"
          - "{{ current_item }}"
          - "{{ discovered | tojson }}"
        outputs:
          - key: done_count
          - key: pending_count
          - key: added
        next: select_wt

      # ── Convergence (mechanical gate) + mandatory teardown ──────────────────────────
      - id: wt_checkpoint
        type: script
        script: scripts/checkpoint.py
        args:
          - "{{ repo_root }}"
          - "{{ features_root }}"
          - "{{ round }}"
        outputs:
          - key: checkpoint_clean
          - key: doctor_output
          - key: round
          - key: fixup_items
        next: decide_wt_checkpoint

      - id: decide_wt_checkpoint
        type: branch
        path: checkpoint_clean
        cases:
          "yes": teardown_app # clean + drained -> phase done
          "no": guard_wt_rounds
        default: teardown_app

      - id: guard_wt_rounds
        type: branch
        path: round
        conditions:
          - op: ">="
            value: "3" # bound the walk fixup re-drain; give up fast but still reap the app
            next: teardown_app
        default: seed_wt_fixup

      - id: seed_wt_fixup
        type: script
        script: scripts/record.py
        args:
          - "{{ wt_worklist_path }}"
          - ""
          - "{{ get_node_output('wt_checkpoint', 'fixup_items') }}"
        outputs:
          - key: done_count
          - key: pending_count
          - key: added
        next: select_wt

      - id: teardown_app
        type: script
        script: scripts/boot-app.py
        args:
          - "--teardown"
          - "{{ app_pgid }}"
          # A bring-up command leaves nothing in our process group; `stop:` is the only
          # way to reap it. Books that omit it keep their stack up between walks on
          # purpose — an expensive shared stack is cheaper to leave running.
          - "{{ stop_cmd }}"
          - "{{ app_cwd }}"
        outputs:
          - key: torn_down
        next: teardown_browser

      - id: teardown_browser
        type: script
        script: scripts/boot-browser.py
        args:
          - "--teardown"
          - "{{ browser_pgid }}"
        outputs:
          - key: torn_down
        next: wt_done

      - id: wt_done
        type: terminal
