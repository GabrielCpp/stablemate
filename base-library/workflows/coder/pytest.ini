[pytest]
# These are integration tests: each one drives the real `workhorse` CLI as a
# subprocess against a sandboxed workflow, and the CLI in turn spawns a subprocess
# per node (mocked agent/command shims). That per-node process spawning — not any
# real work — is the floor on wall-clock time, so the suite is embarrassingly
# parallel and CPU-bound. Run it sharded across cores by default (pytest-xdist) to
# keep the whole suite well under 30s; every test is hermetic (its own tmp_path
# sandbox, git/agent mocks), so cross-worker isolation is safe.
#
# Pass `-n0` to force serial execution (e.g. when using -s / pdb to debug one test).
addopts = -n auto
testpaths = tests
