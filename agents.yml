repo:
  name: stablemate

agents:
  claude: true
  codex: false
  copilot: false

packs:
  - python-workflow
  - stablemate

# groom's web UI is HTMX + server-rendered HTML — select its a11y skills
# directly (only this repo needs them; packs are for bundles reused by ≥2 repos).
skills:
  - ui/ui-accessibility
  - stacks/python/python-htmx-accessibility

# Direct single-item selection (no pack — see agents/packs/CLAUDE.md): the
# /update-skill-from-conversation command that folds a session's learnings back
# into the agent library (skills, commands, root instructions).
prompts:
  - agent-library/update-skill-from-conversation
