# Stand up the LiteLLM proxy in front of OpenRouter.
#
#   cp .env.example .env   # then put your OPENROUTER_API_KEY + a LITELLM_MASTER_KEY in it
#   docker compose -f compose.litellm.yaml up -d
#   curl -s http://localhost:4000/health/readiness   # sanity
#
# The proxy listens on :4000 and serves BOTH an OpenAI-compatible API
# (/v1/chat/completions — for codex/copilot) and an Anthropic-compatible API
# (/v1/messages — for the claude CLI). Point your agent CLI's base URL here.

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: openrouter-cache-proxy
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      # Host port is overridable (default 4000). Set LITELLM_PORT if 4000 is taken
      # — e.g. the Firebase Emulator Suite UI also defaults to :4000.
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY in .env}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
