# LiteLLM proxy config — MiMo-V2.5 over OpenRouter with GUARANTEED caching.
#
# The whole point of this proxy: inject the OpenRouter `provider` preference that
# no agent CLI (claude/codex/copilot) can set on its own. MiMo-V2.5 has two
# providers on OpenRouter — `xiaomi` (cache reads @ $0.0028/M, ~98% off input)
# and `digitalocean` (NO caching). Pinning to `xiaomi` with fallbacks off means
# every request hits the one caching provider, so the prefix cache stays warm
# across all of a node's agentic turns. That pin is the entire guarantee.
#
# xiaomi caches IMPLICITLY (automatic), so we do NOT need cache_control
# breakpoints or session_id stickiness — provider pinning is stronger and
# deterministic (OpenRouter ignores sticky routing when provider.order is set).

model_list:
  # Logical name the agent CLI asks for (AGENT_MODEL=mimo or node `model: mimo`).
  - model_name: mimo
    litellm_params:
      model: openrouter/xiaomi/mimo-v2.5
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        # ── The guarantee: every request → xiaomi, never digitalocean ──────────
        provider:
          order: ["xiaomi"]
          allow_fallbacks: false
        # Ask OpenRouter to return cache/cost accounting in usage so the proxy
        # logs (and verify_cache.py) can confirm cache hits.
        usage:
          include: true

  # The -pro variant, same pinning, if you want to A/B the bigger model.
  - model_name: mimo-pro
    litellm_params:
      model: openrouter/xiaomi/mimo-v2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY
      extra_body:
        provider:
          order: ["xiaomi"]
          allow_fallbacks: false
        usage:
          include: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # Surface OpenRouter's cached-token / cost fields in the proxy's response usage.
  return_response_headers: true
  drop_params: true   # tolerate CLI-specific params the upstream doesn't accept
