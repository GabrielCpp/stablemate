services:
  agent:
    build:
      # Build context is the uv workspace ROOT (one level up), not this
      # directory — the Dockerfile needs the workspace's pyproject.toml/uv.lock
      # (workhorse is a workspace member and has no lock file of its own).
      context: ..
      dockerfile: workhorse/Dockerfile
    # Run as the HOST user's uid:gid so the agent can write into bind-mounted
    # host paths it does not own — specifically the git worktree metadata
    # (.git/worktrees/<id>) that `git worktree add` writes back into the source
    # repo. agents.mk exports these from `id -u`/`id -g`; the 65534 fallback is
    # nobody:nogroup, i.e. the previous behavior when nothing sets them.
    # The image makes /workspace, /runs and /claude-state world-writable so a
    # fresh named volume is usable under any uid (see Dockerfile).
    user: "${AGENT_UID:-65534}:${AGENT_GID:-65534}"
    extra_hosts:
      # Lets the container's groom-sidecar (installed as an editable uv tool from
      # the /mnt/groom-src bind below) reach a `groom` dashboard on the host.
      #
      # NOTE (native Linux Docker Engine): host-gateway resolves to the
      # docker bridge's own gateway IP (e.g. 172.17.0.1), NOT the host's real
      # loopback interface — that equivalence only holds on Docker Desktop's
      # (Mac/Windows) VM-proxied host.docker.internal. `groom serve` therefore
      # defaults to binding 0.0.0.0 (reachable over the bridge); if you override
      # it with --host, use the bridge IP, not 127.0.0.1.
      - "host.docker.internal:host-gateway"
    environment:
      # ── Auth: Claude subscription (Claude.ai OAuth) is the DEFAULT ─────────────
      # Credentials are seeded once from the host's ~/.claude/.credentials.json
      # into the persistent claude-state volume by entrypoint.sh; the CLI then
      # refreshes/rotates the token in-volume across runs and reboots.
      #
      # Optional: skip the file seed and use a long-lived OAuth token instead.
      # Generate it on the host with `claude setup-token` and export it before
      # `docker compose up` (or put it in a .env next to compose.yaml).
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}

      WORKFLOW_PATH: /workflow/workflow.yaml
      # Write run artifacts to the persistent named volume (survives reboots).
      AGENT_RUNS_DIR: /runs
      # The CLI binary lives in a read-only system path; don't let it self-update.
      DISABLE_AUTOUPDATER: "1"

      # ── Bedrock alternative (uncomment this block + the ~/.aws mount below) ────
      # CLAUDE_CODE_USE_BEDROCK: "1"
      # AWS_PROFILE: ${AWS_PROFILE:-default}
    volumes:
      # Subscription credentials — seeded into the volume at startup (read-only here).
      - type: bind
        source: ${HOME}/.claude/.credentials.json
        target: /mnt/claude-credentials.json
        read_only: true

      # Optional host Claude config (settings.json). Uncomment if you keep one.
      # - type: bind
      #   source: ${HOME}/.claude/settings.json
      #   target: /mnt/claude-settings.json
      #   read_only: true

      # ── Bedrock alternative ───────────────────────────────────────────────────
      # - type: bind
      #   source: ${HOME}/.aws
      #   target: /mnt/aws
      #   read_only: true

      # Workflow directory — set via the WORKFLOW_DIR env var. Only required if
      # you actually start this generic `agent` service directly (standalone
      # workhorse testing); per-workflow consumers (farrier's generated
      # local.compose.yaml) define their own named services with their own
      # /workflow mount instead and never select this one, but Compose
      # interpolates every service's variables up front regardless of which
      # service you run — so this can't be a hard `:?` requirement without
      # breaking `docker compose up <other-service>` for anyone merging this
      # file in. Defaults to an unmountable placeholder; only bites if `agent`
      # is actually started without WORKFLOW_DIR set.
      - type: bind
        source: ${WORKFLOW_DIR:-/dev/null/workflow-dir-not-set}
        target: /workflow

      # Optional: host directory containing a .code-workspace file, for
      # multi-repo runs (or non-git sibling folders that can't be cloned — see
      # workhorse/scriptutil.py's checkout_workspace()). Uncomment and set
      # WORKSPACE_DIR_HOST; point the workspace-file env var (e.g.
      # CODER_WORKSPACE) at this mount's target below, not the host path.
      # - type: bind
      #   source: ${WORKSPACE_DIR_HOST:?Set WORKSPACE_DIR_HOST}
      #   target: /mnt/workspace-host

      # groom-sidecar source (the `pipx install --editable` model). groom is NOT
      # baked into the image; entrypoint.sh installs it as an editable uv tool
      # from this bind, so the running sidecar imports the host source live — an
      # edit reaches it via a `reload` over the socket (or a `docker restart`)
      # with no image rebuild. Omit this bind and the container runs without a
      # sidecar. Read-only so a container can never write back into the repo
      # checkout (the editable install writes only into its own tool venv).
      - type: bind
        source: ../groom
        target: /mnt/groom-src
        read_only: true

      # Agent working tree (repo clones, branches, commits) — PERSISTS across
      # container restarts and reboots so in-progress work is never lost.
      - type: volume
        source: workspace
        target: /workspace

      # Claude session state + seeded credentials — persists across reboots.
      - type: volume
        source: claude-state
        target: /claude-state

      # Run artifacts (prompts, outputs, context snapshots) — persists across reboots.
      - type: volume
        source: runs
        target: /runs

volumes:
  # Agent working tree: clones live here so committed work survives reboots.
  workspace:
  # Claude CLI session history, seeded subscription credentials, onboarding flag.
  claude-state:
  # Workflow run artifacts.
  runs:
